<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acceso privado | Cotizador ZacBe</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="auth-screen">
  <div class="auth-card">
    <img src="img/logo-zacbe.png" alt="Grupo ZacBe" />
    <h1>Acceso privado</h1>
    <p>Solo distribuidores autorizados por Grupo ZacBe.</p>
    <form id="loginForm">
      <label>Correo</label>
      <input id="email" type="email" autocomplete="email" required placeholder="correo@empresa.com" />
      <label>Contraseña</label>
      <input id="password" type="password" autocomplete="current-password" required placeholder="Contraseña" />
      <button type="submit">Iniciar sesión</button>
      <div class="auth-error" id="loginError">Correo o contraseña incorrectos, o usuario no autorizado.</div>
    </form>
    <div class="auth-help">Si no tienes acceso, solicita autorización a Grupo ZacBe.</div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const ZACBE_SUPABASE_URL = 'https://dwvngngjkhozuekvflnn.supabase.co';
const ZACBE_SUPABASE_KEY = 'sb_publishable_e2mfIOaBhNP12VdsKWDHqQ_5dcy8iBU';
const zacbeSupabase = window.supabase.createClient(ZACBE_SUPABASE_URL, ZACBE_SUPABASE_KEY);

(async function(){
  const { data } = await zacbeSupabase.auth.getSession();
  if (data.session) window.location.href = 'index.html';
})();

document.getElementById('loginForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorBox = document.getElementById('loginError');
  errorBox.style.display = 'none';
  const { error } = await zacbeSupabase.auth.signInWithPassword({ email, password });
  if (error) {
    errorBox.style.display = 'block';
    return;
  }
  window.location.href = 'index.html';
});
</script>
</body>
</html>
